<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b1020" />
<title>Air Hockey</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #131a33;
    --grid: #1b2347;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #22d3ee;
    --p1c: #22d3ee;
    --p2c: #f87171;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%; overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  .app {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: max(env(safe-area-inset-top), 10px) 12px max(env(safe-area-inset-bottom), 10px);
    height: 100dvh;
  }
  header {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .back {
    color: var(--muted); text-decoration: none; font-size: 14px;
    padding: 6px 10px; border-radius: 8px; background: var(--panel);
    flex-shrink: 0;
  }
  h1 { font-size: 18px; margin: 0; flex: 1; text-align: center; }
  .scoreboard {
    display: flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  #s1 { color: var(--p1c); font-weight: 700; font-size: 22px; min-width: 22px; text-align: right; }
  #s2 { color: var(--p2c); font-weight: 700; font-size: 22px; min-width: 22px; text-align: left; }
  .colon { color: var(--muted); font-size: 16px; }
  .board-wrap {
    position: relative;
    width: min(100vw - 24px, 420px);
    aspect-ratio: 3 / 4;
    background: var(--panel);
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    overflow: hidden;
    touch-action: none;
  }
  canvas { width: 100%; height: 100%; display: block; }
  .overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: rgba(11,16,32,0.88);
    backdrop-filter: blur(4px);
    text-align: center; padding: 20px;
    border-radius: 14px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 22px; }
  .overlay p { margin: 0; color: var(--muted); font-size: 14px; max-width: 280px; }
  button {
    appearance: none; border: none;
    background: var(--accent); color: #04162e;
    font-weight: 700; font-size: 16px;
    padding: 12px 28px; border-radius: 999px; cursor: pointer;
  }
  button:active { transform: translateY(1px); }
  .hint { color: var(--muted); font-size: 12px; text-align: center; max-width: 420px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="back" href="index.html" data-en="← Menu" data-ru="Меню" data-lv="Izvēlne">← Menu</a>
    <h1>Air Hockey</h1>
    <div class="scoreboard">
      <span id="s1">0</span>
      <span class="colon">:</span>
      <span id="s2">0</span>
    </div>
  </header>

  <div class="board-wrap" id="board">
    <canvas id="game"></canvas>
    <div class="overlay show" id="overlay">
      <h2 id="ovTitle">Air Hockey</h2>
      <p id="ovMsg" data-en="Drag your paddle · First to 5 wins!" data-ru="Тяни клюшку · Первый до 5 побеждает!" data-lv="Velc nūju · Pirmais līdz 5 uzvar!">Drag your paddle · First to 5 wins!</p>
      <button id="startBtn" data-en="Start" data-ru="Старт" data-lv="Sākt">Start</button>
    </div>
  </div>

  <div class="hint" data-en="🔵 bottom half · 🔴 top half" data-ru="🔵 нижняя половина · 🔴 верхняя половина" data-lv="🔵 apakšpuse · 🔴 augšpuse">🔵 bottom half · 🔴 top half</div>
</div>

<script src="lang.js"></script>
<script>
(() => {
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const board   = document.getElementById('board');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const ovTitle  = document.getElementById('ovTitle');
  const ovMsg    = document.getElementById('ovMsg');
  const s1El     = document.getElementById('s1');
  const s2El     = document.getElementById('s2');

  const WIN = 5;
  let alive = false, paused = false, raf;
  let W = 1, H = 1;
  let scores = [0, 0];

  const puck = { x: 0, y: 0, vx: 0, vy: 0, r: 1 };
  // [0] = P1 bottom (cyan), [1] = P2 top (red)
  const paddles = [
    { x: 0, y: 0, vx: 0, vy: 0, r: 1 },
    { x: 0, y: 0, vx: 0, vy: 0, r: 1 },
  ];
  const ptrs = new Map(); // pointerId → paddle index
  const keys = {};

  // ── Audio ───────────────────────────────────────────────────────────────────
  let audioCtx;
  function ac() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(freq, dur, vol, type) {
    try {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.18, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    } catch (_) {}
  }
  function sndHit()  { tone(300, 0.07, 0.22); }
  function sndWall() { tone(160, 0.05, 0.12); }
  function sndGoal(player) {
    const f = player === 0 ? 660 : 440;
    tone(f,       0.15, 0.28, 'sine');
    setTimeout(() => tone(f * 1.25, 0.22, 0.22, 'sine'), 130);
  }

  // ── Layout ──────────────────────────────────────────────────────────────────
  function fitCanvas() {
    const rect = board.getBoundingClientRect();
    const dpr  = window.devicePixelRatio || 1;
    canvas.width  = Math.floor(rect.width  * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = rect.width; H = rect.height;
    puck.r      = Math.min(W, H) * 0.042;
    paddles[0].r = paddles[1].r = Math.min(W, H) * 0.075;
    if (!alive) draw();
  }
  window.addEventListener('resize', fitCanvas);

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
  function goalBounds() {
    const hw = W * 0.21;
    return { x1: W / 2 - hw, x2: W / 2 + hw };
  }

  // ── Reset / init ─────────────────────────────────────────────────────────────
  function resetPuck(dir) {
    puck.x = W / 2; puck.y = H / 2;
    const spd   = Math.min(W, H) * 0.005;
    const angle = (Math.random() - 0.5) * 0.55;
    puck.vx = Math.sin(angle) * spd;
    puck.vy = dir * Math.cos(angle) * spd; // dir: +1 down, -1 up
  }

  function initGame() {
    scores = [0, 0];
    s1El.textContent = 0; s2El.textContent = 0;
    paddles[0].x = W / 2; paddles[0].y = H * 0.78;
    paddles[1].x = W / 2; paddles[1].y = H * 0.22;
    paddles[0].vx = paddles[0].vy = paddles[1].vx = paddles[1].vy = 0;
    resetPuck(Math.random() < 0.5 ? 1 : -1);
    paused = false; alive = true;
  }

  // ── Scoring ──────────────────────────────────────────────────────────────────
  function goalScored(scorer) {
    scores[scorer]++;
    s1El.textContent = scores[0];
    s2El.textContent = scores[1];
    sndGoal(scorer);

    if (scores[scorer] >= WIN) {
      alive = false;
      const cyan = scorer === 0;
      ovTitle.textContent = cyan
        ? Lang.t('Синий побеждает! 🔵', 'Zilais uzvar! 🔵', 'Blue wins! 🔵')
        : Lang.t('Красный побеждает! 🔴', 'Sarkanais uzvar! 🔴', 'Red wins! 🔴');
      const result = Lang.t(
        `Счёт: ${scores[0]}–${scores[1]}. Снова?`,
        `Rezultāts: ${scores[0]}–${scores[1]}. Vēlreiz?`,
        `Score: ${scores[0]}–${scores[1]}. Play again?`
      );
      // Spanish sneak-in on win — 60% chance
      ovMsg.textContent = Lang.pickEs(`${Lang.esWin()} ${scores[0]}–${scores[1]}`, result, 0.6);
      startBtn.textContent = Lang.t('Снова', 'Vēlreiz', 'Again');
      overlay.classList.add('show');
      return;
    }

    // Pause briefly, relaunch toward the player who got scored on
    paused = true;
    puck.vx = 0; puck.vy = 0;
    puck.x = W / 2; puck.y = H / 2;
    const scoredOn = 1 - scorer;
    setTimeout(() => {
      paused = false;
      resetPuck(scoredOn === 0 ? 1 : -1);
    }, 850);
  }

  // ── Physics step ─────────────────────────────────────────────────────────────
  function movePaddles() {
    const ks = Math.min(W, H) * 0.009;
    if (keys['ArrowLeft'])  paddles[0].vx -= ks * 0.4;
    if (keys['ArrowRight']) paddles[0].vx += ks * 0.4;
    if (keys['ArrowUp'])    paddles[0].vy -= ks * 0.4;
    if (keys['ArrowDown'])  paddles[0].vy += ks * 0.4;
    if (keys['a'] || keys['A']) paddles[1].vx -= ks * 0.4;
    if (keys['d'] || keys['D']) paddles[1].vx += ks * 0.4;
    if (keys['w'] || keys['W']) paddles[1].vy -= ks * 0.4;
    if (keys['s'] || keys['S']) paddles[1].vy += ks * 0.4;

    for (let i = 0; i < 2; i++) {
      const p = paddles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.70; p.vy *= 0.70;
      p.x = clamp(p.x, p.r, W - p.r);
      p.y = i === 0
        ? clamp(p.y, H / 2 + p.r * 0.5, H - p.r)
        : clamp(p.y, p.r, H / 2 - p.r * 0.5);
    }
  }

  function step() {
    movePaddles();
    if (paused) return;

    // Move puck
    puck.x += puck.vx;
    puck.y += puck.vy;
    puck.vx *= 0.9988;
    puck.vy *= 0.9988;

    // Keep puck moving
    const spd = Math.hypot(puck.vx, puck.vy);
    const minSpd = Math.min(W, H) * 0.002;
    if (spd > 0 && spd < minSpd) {
      puck.vx = puck.vx / spd * minSpd;
      puck.vy = puck.vy / spd * minSpd;
    }
    if (spd === 0) puck.vy = minSpd;

    const { x1, x2 } = goalBounds();
    const inGoal = puck.x > x1 && puck.x < x2;

    // Left / right walls
    if (puck.x - puck.r < 0) { puck.x = puck.r; puck.vx = Math.abs(puck.vx); sndWall(); }
    if (puck.x + puck.r > W) { puck.x = W - puck.r; puck.vx = -Math.abs(puck.vx); sndWall(); }

    // Top edge: goal (P1 scores) or wall bounce
    if (puck.y - puck.r < 0) {
      if (inGoal) { goalScored(0); return; }
      puck.y = puck.r; puck.vy = Math.abs(puck.vy); sndWall();
    }

    // Bottom edge: goal (P2 scores) or wall bounce
    if (puck.y + puck.r > H) {
      if (inGoal) { goalScored(1); return; }
      puck.y = H - puck.r; puck.vy = -Math.abs(puck.vy); sndWall();
    }

    // Paddle collisions
    const maxSpd = Math.min(W, H) * 0.020;
    for (let i = 0; i < 2; i++) {
      const p = paddles[i];
      const dx = puck.x - p.x, dy = puck.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minD = p.r + puck.r;
      if (dist < minD && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        puck.x = p.x + nx * minD;
        puck.y = p.y + ny * minD;
        const rel = (puck.vx - p.vx) * nx + (puck.vy - p.vy) * ny;
        if (rel < 0) {
          const kick = Math.hypot(p.vx, p.vy);
          const base = Math.max(Math.min(W, H) * 0.006, Math.hypot(puck.vx, puck.vy) * 1.1);
          let newSpd = Math.min(base + kick * 0.55, maxSpd);
          puck.vx = nx * newSpd;
          puck.vy = ny * newSpd;
          sndHit();
        }
      }
    }

    // Speed cap
    const s2 = Math.hypot(puck.vx, puck.vy);
    if (s2 > maxSpd) { puck.vx = puck.vx / s2 * maxSpd; puck.vy = puck.vy / s2 * maxSpd; }
  }

  // ── Draw ─────────────────────────────────────────────────────────────────────
  function draw() {
    ctx.fillStyle = '#0c1426';
    ctx.fillRect(0, 0, W, H);

    const { x1, x2 } = goalBounds();
    const postW = 7, postH = 22;

    // Goal tint zones
    ctx.fillStyle = 'rgba(34,211,238,0.10)';
    ctx.fillRect(x1, 0, x2 - x1, 5);
    ctx.fillStyle = 'rgba(248,113,113,0.10)';
    ctx.fillRect(x1, H - 5, x2 - x1, 5);

    // Goal posts
    ctx.fillStyle = '#22d3ee';
    ctx.fillRect(x1 - postW / 2, 0, postW, postH);
    ctx.fillRect(x2 - postW / 2, 0, postW, postH);
    ctx.fillStyle = '#f87171';
    ctx.fillRect(x1 - postW / 2, H - postH, postW, postH);
    ctx.fillRect(x2 - postW / 2, H - postH, postW, postH);

    // Center line
    ctx.strokeStyle = 'rgba(255,255,255,0.09)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();
    ctx.setLineDash([]);

    // Center circle
    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(W / 2, H / 2, H * 0.11, 0, Math.PI * 2); ctx.stroke();

    // Player labels (faint)
    const fs = Math.min(W, H) * 0.05;
    ctx.font = `600 ${fs}px sans-serif`;
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(34,211,238,0.28)';
    ctx.textAlign = 'left';
    ctx.fillText('P1', 10, H - 6);
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(248,113,113,0.28)';
    ctx.fillText('P2', 10, 6);

    // Paddles
    const pColors = ['#22d3ee', '#f87171'];
    for (let i = 0; i < 2; i++) {
      const p = paddles[i];
      // Glow
      const gr = ctx.createRadialGradient(p.x, p.y, p.r * 0.4, p.x, p.y, p.r + 12);
      gr.addColorStop(0, i === 0 ? 'rgba(34,211,238,0.30)' : 'rgba(248,113,113,0.30)');
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 12, 0, Math.PI * 2);
      ctx.fillStyle = gr; ctx.fill();
      // Body
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = pColors[i]; ctx.fill();
      // Inner ring
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.58, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 2.5; ctx.stroke();
      // Center dot
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
    }

    // Puck shadow
    ctx.beginPath(); ctx.arc(puck.x + 3, puck.y + 4, puck.r * 0.9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
    // Puck body
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI * 2);
    ctx.fillStyle = '#dde3ef'; ctx.fill();
    // Puck inner
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fill();
  }

  // ── Game loop ────────────────────────────────────────────────────────────────
  function loop() {
    if (!alive) return;
    step();
    draw();
    raf = requestAnimationFrame(loop);
  }

  function start() {
    cancelAnimationFrame(raf);
    overlay.classList.remove('show');
    ovTitle.textContent = 'Air Hockey';
    initGame();
    loop();
  }

  startBtn.addEventListener('click', start);

  // ── Pointer controls ─────────────────────────────────────────────────────────
  board.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const rect = board.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const idx = y < H / 2 ? 1 : 0; // top half → P2, bottom → P1
    for (const [id, pi] of ptrs) { if (pi === idx) { ptrs.delete(id); break; } }
    ptrs.set(e.pointerId, idx);
    board.setPointerCapture(e.pointerId);
  });

  board.addEventListener('pointermove', (e) => {
    if (!ptrs.has(e.pointerId)) return;
    const rect = board.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const p = paddles[ptrs.get(e.pointerId)];
    p.vx = (x - p.x) * 0.52;
    p.vy = (y - p.y) * 0.52;
  });

  board.addEventListener('pointerup',     (e) => { ptrs.delete(e.pointerId); });
  board.addEventListener('pointercancel', (e) => { ptrs.delete(e.pointerId); });

  // ── Keyboard controls ────────────────────────────────────────────────────────
  window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (!alive && (e.key === ' ' || e.key === 'Enter')) start();
  });
  window.addEventListener('keyup', (e) => { delete keys[e.key]; });

  fitCanvas();
})();
</script>
</body>
</html>
