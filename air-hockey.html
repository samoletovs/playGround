<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b1020" />
<title>Air Hockey</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #131a33;
    --grid: #1b2347;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --accent: #22d3ee;
    --p1c: #22d3ee;
    --p2c: #f87171;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%; overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
  }
  .app {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: max(env(safe-area-inset-top), 10px) 12px max(env(safe-area-inset-bottom), 10px);
    height: 100dvh;
  }
  header {
    width: 100%; max-width: 480px;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .back {
    color: var(--muted); text-decoration: none; font-size: 14px;
    padding: 6px 10px; border-radius: 8px; background: var(--panel);
    flex-shrink: 0;
  }
  h1 { font-size: 18px; margin: 0; flex: 1; text-align: center; }
  .scoreboard {
    display: flex; align-items: center; gap: 6px;
    font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  #s1 { color: var(--p1c); font-weight: 700; font-size: 22px; min-width: 22px; text-align: right; }
  #s2 { color: var(--p2c); font-weight: 700; font-size: 22px; min-width: 22px; text-align: left; }
  .colon { color: var(--muted); font-size: 16px; }
  .board-wrap {
    position: relative;
    /* 3:4 board scales to fit the screen on phone AND iPad. */
    width: min(100vw - 24px, calc((100dvh - 200px) * 3 / 4), 700px);
    aspect-ratio: 3 / 4;
    background: var(--panel);
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    overflow: hidden;
    touch-action: none;
  }
  canvas { width: 100%; height: 100%; display: block; }
  .overlay {
    position: absolute; inset: 0;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
    background: rgba(11,16,32,0.88);
    backdrop-filter: blur(4px);
    text-align: center; padding: 20px;
    border-radius: 14px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 22px; }
  .overlay p { margin: 0; color: var(--muted); font-size: 14px; max-width: 280px; }
  .mode-row { display: flex; gap: 8px; }
  .mode-opt {
    appearance: none; border: 2px solid rgba(255,255,255,0.12);
    background: transparent; color: var(--muted);
    font-weight: 600; font-size: 14px;
    padding: 8px 16px; border-radius: 999px; cursor: pointer;
  }
  .mode-opt.active {
    border-color: var(--accent);
    color: var(--text);
    background: rgba(34,211,238,0.12);
  }
  .mode-opt:active { transform: translateY(1px); }
  button.start {
    appearance: none; border: none;
    background: var(--accent); color: #04162e;
    font-weight: 700; font-size: 16px;
    padding: 12px 28px; border-radius: 999px; cursor: pointer;
  }
  button.start:active { transform: translateY(1px); }
  .hint { color: var(--muted); font-size: 12px; text-align: center; max-width: 420px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="back" href="index.html" data-en="← Menu" data-ru="Меню" data-lv="Izvēlne">← Menu</a>
    <h1>Air Hockey</h1>
    <div class="scoreboard">
      <span id="s1">0</span>
      <span class="colon">:</span>
      <span id="s2">0</span>
    </div>
  </header>

  <div class="board-wrap" id="board">
    <canvas id="game"></canvas>
    <div class="overlay show" id="overlay">
      <h2 id="ovTitle">Air Hockey</h2>
      <p id="ovMsg" data-en="Drag your paddle · First to 5 wins!" data-ru="Тяни клюшку · Первый до 5 побеждает!" data-lv="Velc nūju · Pirmais līdz 5 uzvar!">Drag your paddle · First to 5 wins!</p>
      <div class="mode-row">
        <button class="mode-opt active" id="btn1p" data-en="🤖 vs Bot" data-ru="🤖 vs Бот" data-lv="🤖 vs Bots">🤖 vs Bot</button>
        <button class="mode-opt" id="btn2p" data-en="👥 2 Players" data-ru="👥 2 игрока" data-lv="👥 2 spēlētāji">👥 2 Players</button>
      </div>
      <button class="start" id="startBtn" data-en="Start" data-ru="Старт" data-lv="Sākt">Start</button>
    </div>
  </div>

  <div class="hint" id="hint" data-en="🔵 bottom half · 🔴 top half" data-ru="🔵 нижняя половина · 🔴 верхняя половина" data-lv="🔵 apakšpuse · 🔴 augšpuse">🔵 bottom half · 🔴 top half</div>
</div>

<script src="lang.js"></script>
<script>
(() => {
  const canvas   = document.getElementById('game');
  const ctx      = canvas.getContext('2d');
  const board    = document.getElementById('board');
  const overlay  = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const btn1p    = document.getElementById('btn1p');
  const btn2p    = document.getElementById('btn2p');
  const ovTitle  = document.getElementById('ovTitle');
  const ovMsg    = document.getElementById('ovMsg');
  const hintEl   = document.getElementById('hint');
  const s1El     = document.getElementById('s1');
  const s2El     = document.getElementById('s2');

  const WIN = 5;
  let alive = false, paused = false, raf;
  let W = 1, H = 1;
  let scores = [0, 0];
  let aiMode = true; // default: vs bot

  const puck = { x: 0, y: 0, vx: 0, vy: 0, r: 1 };
  const paddles = [
    { x: 0, y: 0, vx: 0, vy: 0, r: 1 }, // P1 bottom (cyan)
    { x: 0, y: 0, vx: 0, vy: 0, r: 1 }, // P2 top (red / bot)
  ];
  const ptrs = new Map();
  const keys = {};

  // ── Mode toggle ──────────────────────────────────────────────────────────────
  btn1p.addEventListener('click', () => { aiMode = true;  btn1p.classList.add('active'); btn2p.classList.remove('active'); });
  btn2p.addEventListener('click', () => { aiMode = false; btn2p.classList.add('active'); btn1p.classList.remove('active'); });

  // ── Audio ────────────────────────────────────────────────────────────────────
  let audioCtx;
  function ac() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function tone(freq, dur, vol, type) {
    try {
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.type = type || 'square'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.18, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    } catch (_) {}
  }
  function sndHit(str) { tone(260 + str * 200, 0.07, 0.14 + str * 0.20); }
  function sndWall() { tone(160, 0.05, 0.12); }
  function sndGoal(player) {
    const f = player === 0 ? 660 : 440;
    tone(f, 0.15, 0.30, 'sine');
    setTimeout(() => tone(f * 1.25, 0.22, 0.24, 'sine'), 130);
  }

  // ── Layout ───────────────────────────────────────────────────────────────────
  function fitCanvas() {
    const rect = board.getBoundingClientRect();
    const dpr  = window.devicePixelRatio || 1;
    canvas.width  = Math.floor(rect.width  * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = rect.width; H = rect.height;
    puck.r       = Math.min(W, H) * 0.042;
    paddles[0].r = paddles[1].r = Math.min(W, H) * 0.075;
    if (!alive) draw();
  }
  window.addEventListener('resize', fitCanvas);

  function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
  function goalBounds() {
    const hw = W * 0.21;
    return { x1: W / 2 - hw, x2: W / 2 + hw };
  }

  // ── Reset ────────────────────────────────────────────────────────────────────
  function resetPuck(dir) {
    puck.x = W / 2; puck.y = H / 2;
    const spd   = Math.min(W, H) * 0.008;
    const angle = (Math.random() - 0.5) * 0.6;
    puck.vx = Math.sin(angle) * spd;
    puck.vy = dir * Math.cos(angle) * spd;
  }

  function initGame() {
    scores = [0, 0];
    s1El.textContent = 0; s2El.textContent = 0;
    paddles[0].x = W / 2; paddles[0].y = H * 0.78;
    paddles[1].x = W / 2; paddles[1].y = H * 0.22;
    paddles[0].vx = paddles[0].vy = paddles[1].vx = paddles[1].vy = 0;
    resetPuck(Math.random() < 0.5 ? 1 : -1);
    paused = false; alive = true;
    // Update hint
    if (aiMode) {
      hintEl.setAttribute('data-en', '🔵 you = bottom · 🤖 bot = top');
      hintEl.setAttribute('data-ru', '🔵 ты = снизу · 🤖 бот = сверху');
      hintEl.setAttribute('data-lv', '🔵 tu = apakšā · 🤖 bots = augšā');
    } else {
      hintEl.setAttribute('data-en', '🔵 bottom half · 🔴 top half');
      hintEl.setAttribute('data-ru', '🔵 нижняя половина · 🔴 верхняя половина');
      hintEl.setAttribute('data-lv', '🔵 apakšpuse · 🔴 augšpuse');
    }
    Lang.applyDom(hintEl.parentElement);
  }

  // ── Scoring ──────────────────────────────────────────────────────────────────
  function goalScored(scorer) {
    scores[scorer]++;
    s1El.textContent = scores[0];
    s2El.textContent = scores[1];
    sndGoal(scorer);

    if (scores[scorer] >= WIN) {
      alive = false;
      const isP1 = scorer === 0;
      const botWon = aiMode && !isP1;
      ovTitle.textContent = botWon
        ? Lang.t('Бот побеждает! 🤖', 'Bots uzvar! 🤖', 'Bot wins! 🤖')
        : isP1
          ? Lang.t('Синий побеждает! 🔵', 'Zilais uzvar! 🔵', 'Blue wins! 🔵')
          : Lang.t('Красный побеждает! 🔴', 'Sarkanais uzvar! 🔴', 'Red wins! 🔴');
      const result = Lang.t(
        `Счёт: ${scores[0]}–${scores[1]}. Снова?`,
        `Rezultāts: ${scores[0]}–${scores[1]}. Vēlreiz?`,
        `Score: ${scores[0]}–${scores[1]}. Play again?`
      );
      ovMsg.textContent = Lang.pickEs(`${Lang.esWin()} ${scores[0]}–${scores[1]}`, result, 0.6);
      startBtn.textContent = Lang.t('Снова', 'Vēlreiz', 'Again');
      overlay.classList.add('show');
      return;
    }

    paused = true;
    puck.vx = 0; puck.vy = 0;
    puck.x = W / 2; puck.y = H / 2;
    const scoredOn = 1 - scorer;
    setTimeout(() => {
      paused = false;
      resetPuck(scoredOn === 0 ? 1 : -1);
    }, 850);
  }

  // ── AI ───────────────────────────────────────────────────────────────────────
  let aiTargetX = 0;
  let aiUpdateTimer = 0;

  function aiStep() {
    const p = paddles[1];
    const aiMaxSpd = Math.min(W, H) * 0.014;

    // Recalculate target every ~6 frames for realistic reaction lag
    aiUpdateTimer--;
    if (aiUpdateTimer <= 0) {
      aiUpdateTimer = 5 + Math.floor(Math.random() * 4);

      if (puck.vy < -0.3) {
        // Puck heading toward AI — predict x at paddle y
        const steps = (p.y - puck.y) / (-puck.vy);
        let px = puck.x + puck.vx * Math.max(0, steps);
        // One-bounce wall prediction
        const lo = puck.r, hi = W - puck.r;
        while (px < lo) px = 2 * lo - px;
        while (px > hi) px = 2 * hi - px;
        // Add imprecision (±6% of width) — makes it beatable
        aiTargetX = px + (Math.random() - 0.5) * W * 0.12;
      } else {
        // Puck going away — drift back to center
        aiTargetX = W / 2 + (Math.random() - 0.5) * W * 0.08;
      }
    }

    // Vertical: if puck close, lean forward to intercept; else hold defense row
    const defY = H * 0.22;
    const attackY = puck.vy < 0 && puck.y < H * 0.45
      ? Math.max(p.r, puck.y + p.r + puck.r + 4)
      : defY;
    const targetY = clamp(attackY, p.r, H / 2 - p.r * 0.5);

    const dx = aiTargetX - p.x;
    const dy = targetY - p.y;
    const dist = Math.hypot(dx, dy);
    const sp = Math.min(aiMaxSpd, dist * 0.22);
    if (dist > 1) { p.vx = (dx / dist) * sp; p.vy = (dy / dist) * sp; }
  }

  // ── Physics ──────────────────────────────────────────────────────────────────
  function movePaddles() {
    const ks = Math.min(W, H) * 0.009;
    if (keys['ArrowLeft'])  paddles[0].vx -= ks * 0.4;
    if (keys['ArrowRight']) paddles[0].vx += ks * 0.4;
    if (keys['ArrowUp'])    paddles[0].vy -= ks * 0.4;
    if (keys['ArrowDown'])  paddles[0].vy += ks * 0.4;
    if (!aiMode) {
      if (keys['a'] || keys['A']) paddles[1].vx -= ks * 0.4;
      if (keys['d'] || keys['D']) paddles[1].vx += ks * 0.4;
      if (keys['w'] || keys['W']) paddles[1].vy -= ks * 0.4;
      if (keys['s'] || keys['S']) paddles[1].vy += ks * 0.4;
    }
    if (aiMode) aiStep();

    for (let i = 0; i < 2; i++) {
      const p = paddles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.70; p.vy *= 0.70;
      p.x = clamp(p.x, p.r, W - p.r);
      p.y = i === 0
        ? clamp(p.y, H / 2 + p.r * 0.5, H - p.r)
        : clamp(p.y, p.r, H / 2 - p.r * 0.5);
    }
  }

  function step() {
    movePaddles();
    if (paused) return;

    puck.x += puck.vx;
    puck.y += puck.vy;
    puck.vx *= 0.9988;
    puck.vy *= 0.9988;

    const spd = Math.hypot(puck.vx, puck.vy);
    const minSpd = Math.min(W, H) * 0.002;
    if (spd > 0 && spd < minSpd) { puck.vx = puck.vx / spd * minSpd; puck.vy = puck.vy / spd * minSpd; }
    if (spd === 0) puck.vy = minSpd;

    const { x1, x2 } = goalBounds();
    const inGoal = puck.x > x1 && puck.x < x2;

    if (puck.x - puck.r < 0) { puck.x = puck.r;      puck.vx =  Math.abs(puck.vx); sndWall(); }
    if (puck.x + puck.r > W) { puck.x = W - puck.r;  puck.vx = -Math.abs(puck.vx); sndWall(); }

    if (puck.y - puck.r < 0) {
      if (inGoal) { goalScored(0); return; }
      puck.y = puck.r; puck.vy = Math.abs(puck.vy); sndWall();
    }
    if (puck.y + puck.r > H) {
      if (inGoal) { goalScored(1); return; }
      puck.y = H - puck.r; puck.vy = -Math.abs(puck.vy); sndWall();
    }

    // Paddle-puck collisions — impulse physics: fast swing = fast puck
    const maxSpd = Math.min(W, H) * 0.040;
    for (let i = 0; i < 2; i++) {
      const p = paddles[i];
      const dx = puck.x - p.x, dy = puck.y - p.y;
      const dist = Math.hypot(dx, dy);
      const minD = p.r + puck.r;
      if (dist < minD && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        puck.x = p.x + nx * minD;
        puck.y = p.y + ny * minD;
        // Relative velocity along collision normal
        const rel = (puck.vx - p.vx) * nx + (puck.vy - p.vy) * ny;
        if (rel < 0) {
          // Impulse: e=0.88 restitution, paddle mass >> puck so paddle doesn't slow
          // Hard swing → big relative velocity → big impulse → fast puck
          const impulse = -(1 + 0.88) * rel;
          puck.vx += impulse * nx;
          puck.vy += impulse * ny;
          const spd2 = Math.hypot(puck.vx, puck.vy);
          const minS = Math.min(W, H) * 0.004;
          if (spd2 > 0 && spd2 < minS) { puck.vx = puck.vx / spd2 * minS; puck.vy = puck.vy / spd2 * minS; }
          if (spd2 > maxSpd) { puck.vx = puck.vx / spd2 * maxSpd; puck.vy = puck.vy / spd2 * maxSpd; }
          sndHit(Math.min(1, spd2 / maxSpd));
        }
      }
    }
  }

  // ── Draw ─────────────────────────────────────────────────────────────────────
  function draw() {
    ctx.fillStyle = '#0c1426';
    ctx.fillRect(0, 0, W, H);

    const { x1, x2 } = goalBounds();
    const postW = 7, postH = 22;

    ctx.fillStyle = 'rgba(34,211,238,0.10)';
    ctx.fillRect(x1, 0, x2 - x1, 5);
    ctx.fillStyle = 'rgba(248,113,113,0.10)';
    ctx.fillRect(x1, H - 5, x2 - x1, 5);

    ctx.fillStyle = '#22d3ee';
    ctx.fillRect(x1 - postW / 2, 0, postW, postH);
    ctx.fillRect(x2 - postW / 2, 0, postW, postH);
    ctx.fillStyle = '#f87171';
    ctx.fillRect(x1 - postW / 2, H - postH, postW, postH);
    ctx.fillRect(x2 - postW / 2, H - postH, postW, postH);

    ctx.strokeStyle = 'rgba(255,255,255,0.09)';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = 'rgba(255,255,255,0.07)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(W / 2, H / 2, H * 0.11, 0, Math.PI * 2); ctx.stroke();

    const fs = Math.min(W, H) * 0.05;
    ctx.font = `600 ${fs}px sans-serif`;
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = 'rgba(34,211,238,0.28)';
    ctx.textAlign = 'left';
    ctx.fillText('P1', 10, H - 6);
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(248,113,113,0.28)';
    ctx.fillText(aiMode ? '🤖' : 'P2', 10, 6);

    const pColors = ['#22d3ee', '#f87171'];
    for (let i = 0; i < 2; i++) {
      const p = paddles[i];
      const gr = ctx.createRadialGradient(p.x, p.y, p.r * 0.4, p.x, p.y, p.r + 12);
      gr.addColorStop(0, i === 0 ? 'rgba(34,211,238,0.30)' : 'rgba(248,113,113,0.30)');
      gr.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 12, 0, Math.PI * 2);
      ctx.fillStyle = gr; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = pColors[i]; ctx.fill();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.58, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 2.5; ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.18, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fill();
    }

    ctx.beginPath(); ctx.arc(puck.x + 3, puck.y + 4, puck.r * 0.9, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI * 2);
    ctx.fillStyle = '#dde3ef'; ctx.fill();
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r * 0.45, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)'; ctx.fill();
  }

  // ── Loop ─────────────────────────────────────────────────────────────────────
  function loop() {
    if (!alive) return;
    step(); draw();
    raf = requestAnimationFrame(loop);
  }

  function start() {
    cancelAnimationFrame(raf);
    overlay.classList.remove('show');
    ovTitle.textContent = 'Air Hockey';
    aiUpdateTimer = 0;
    initGame();
    loop();
  }

  startBtn.addEventListener('click', start);

  // ── Pointer controls ──────────────────────────────────────────────────────────
  board.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    const rect = board.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const idx = y < H / 2 ? 1 : 0;
    if (aiMode && idx === 1) return; // top half belongs to bot
    for (const [id, pi] of ptrs) { if (pi === idx) { ptrs.delete(id); break; } }
    ptrs.set(e.pointerId, idx);
    board.setPointerCapture(e.pointerId);
  });

  board.addEventListener('pointermove', (e) => {
    if (!ptrs.has(e.pointerId)) return;
    const rect = board.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const p = paddles[ptrs.get(e.pointerId)];
    p.vx = (x - p.x) * 0.52;
    p.vy = (y - p.y) * 0.52;
  });

  board.addEventListener('pointerup',     (e) => { ptrs.delete(e.pointerId); });
  board.addEventListener('pointercancel', (e) => { ptrs.delete(e.pointerId); });

  // ── Keyboard ──────────────────────────────────────────────────────────────────
  window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (!alive && (e.key === ' ' || e.key === 'Enter')) start();
  });
  window.addEventListener('keyup', (e) => { delete keys[e.key]; });

  fitCanvas();
})();
</script>
</body>
</html>
