<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b1020" />
<title>Tetris</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #131a33;
    --grid: #1b2347;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --btn: #1f2a55;
    --btn-active: #2a3a75;
    --accent: #60a5fa;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: max(env(safe-area-inset-top), 10px) 10px max(env(safe-area-inset-bottom), 10px);
    height: 100dvh;
  }
  header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .title-wrap { display: flex; align-items: center; gap: 10px; }
  .back {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--panel);
  }
  h1 { font-size: 20px; margin: 0; letter-spacing: 0.5px; }
  .score { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 13px; text-align: right; line-height: 1.3; }
  .score b { color: var(--text); }
  .board-wrap {
    position: relative;
    /* Tetris is 10:20 (1:2) so the height budget dominates on most screens.
       width = min(viewport-width, half-of-height-budget). */
    width: min(100vw - 20px, calc((100dvh - 220px) / 2), 500px);
    aspect-ratio: 10 / 20;
    background: var(--panel);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    touch-action: none;
  }
  canvas { width: 100%; height: 100%; display: block; }
  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    background: rgba(11, 16, 32, 0.82);
    backdrop-filter: blur(4px);
    text-align: center;
    padding: 16px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 22px; }
  .overlay p { margin: 0; color: var(--muted); font-size: 14px; }
  .play-btn {
    appearance: none;
    border: none;
    background: var(--accent);
    color: #04162e;
    font-weight: 700;
    font-size: 16px;
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(96, 165, 250, 0.35);
  }
  .controls {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    width: min(100vw - 20px, 420px);
  }
  .controls button {
    appearance: none;
    border: none;
    background: var(--btn);
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
    padding: 14px 0;
    border-radius: 12px;
    cursor: pointer;
    touch-action: manipulation;
  }
  .controls button:active { background: var(--btn-active); transform: translateY(1px); }
  .controls .label { font-size: 11px; display: block; color: var(--muted); font-weight: 500; margin-top: 2px; }
  .hint { color: var(--muted); font-size: 12px; text-align: center; max-width: 420px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-wrap">
      <a class="back" href="index.html" data-en="← Menu" data-ru="Меню" data-lv="Izvēlne">← Menu</a>
      <h1>Tetris</h1>
    </div>
    <div class="score">
      <span data-en="Score" data-ru="Счёт" data-lv="Rezultāts">Score</span> <b id="score">0</b>
      ·
      <span data-en="Lines" data-ru="Линии" data-lv="Līnijas">Lines</span> <b id="lines">0</b><br>
      <span data-en="Level" data-ru="Уровень" data-lv="Līmenis">Level</span> <b id="level">1</b>
      ·
      <span data-en="Best" data-ru="Лучший" data-lv="Labākais">Best</span> <b id="best">0</b>
    </div>
  </header>

  <div class="board-wrap" id="board">
    <canvas id="game"></canvas>
    <div class="overlay show" id="overlay">
      <h2 id="title">Tetris</h2>
      <p id="msg"
         data-en="On-screen buttons or arrow keys."
         data-ru="Кнопки на экране или стрелки."
         data-lv="Pogas uz ekrāna vai bultas.">On-screen buttons or arrow keys.</p>
      <button class="play-btn" id="startBtn" data-en="Start" data-ru="Старт" data-lv="Sākt">Start</button>
    </div>
  </div>

  <div class="controls" id="controls">
    <button data-act="left">←<span class="label" data-en="Left" data-ru="Влево" data-lv="Pa kreisi">Left</span></button>
    <button data-act="rotate">⟳<span class="label" data-en="Rotate" data-ru="Поворот" data-lv="Pagriezt">Rotate</span></button>
    <button data-act="right">→<span class="label" data-en="Right" data-ru="Вправо" data-lv="Pa labi">Right</span></button>
    <button data-act="soft">↓<span class="label" data-en="Soft" data-ru="Вниз" data-lv="Lejup">Soft</span></button>
    <button data-act="hard">⤓<span class="label" data-en="Drop" data-ru="Бросок" data-lv="Mest">Drop</span></button>
  </div>

  <div class="hint"
       data-en="Keyboard: ← → move, ↑ rotate, ↓ soft drop, space hard drop."
       data-ru="Клавиатура: ← → движение, ↑ поворот, ↓ вниз, пробел — бросок."
       data-lv="Tastatūra: ← → kustini, ↑ pagriez, ↓ lejup, atstarpe — mest.">Keyboard: ← → move, ↑ rotate, ↓ soft drop, space hard drop.</div>
</div>

<script src="lang.js"></script>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const board = document.getElementById('board');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const titleEl = document.getElementById('title');
  const msgEl = document.getElementById('msg');
  const scoreEl = document.getElementById('score');
  const linesEl = document.getElementById('lines');
  const levelEl = document.getElementById('level');
  const bestEl = document.getElementById('best');
  const controls = document.getElementById('controls');

  const COLS = 10;
  const ROWS = 20;

  const SHAPES = {
    I: { color: '#22d3ee', cells: [[0,1],[1,1],[2,1],[3,1]], size: 4 },
    O: { color: '#facc15', cells: [[1,0],[2,0],[1,1],[2,1]], size: 4 },
    T: { color: '#c084fc', cells: [[1,0],[0,1],[1,1],[2,1]], size: 3 },
    S: { color: '#4ade80', cells: [[1,0],[2,0],[0,1],[1,1]], size: 3 },
    Z: { color: '#f87171', cells: [[0,0],[1,0],[1,1],[2,1]], size: 3 },
    J: { color: '#60a5fa', cells: [[0,0],[0,1],[1,1],[2,1]], size: 3 },
    L: { color: '#fb923c', cells: [[2,0],[0,1],[1,1],[2,1]], size: 3 },
  };
  const TYPES = Object.keys(SHAPES);

  let grid, current, queue, score, lines, level, best, alive, dropMs, lastDrop, raf;
  best = parseInt(localStorage.getItem('tetris.best') || '0', 10);
  bestEl.textContent = best;

  function fitCanvas() {
    const rect = board.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }
  window.addEventListener('resize', fitCanvas);

  function newGrid() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  }

  function makePiece(type) {
    const def = SHAPES[type];
    const cells = def.cells.map(([x, y]) => [x, y]);
    return { type, color: def.color, size: def.size, cells, x: Math.floor((COLS - def.size) / 2), y: 0 };
  }

  function refillQueue() {
    const bag = TYPES.slice();
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
    queue.push(...bag);
  }

  function nextPiece() {
    if (queue.length < 4) refillQueue();
    return makePiece(queue.shift());
  }

  function rotate(piece) {
    if (piece.type === 'O') return piece.cells.map(c => c.slice());
    const s = piece.size;
    return piece.cells.map(([x, y]) => [s - 1 - y, x]);
  }

  function collides(piece, ox, oy, cells) {
    cells = cells || piece.cells;
    for (const [cx, cy] of cells) {
      const x = piece.x + cx + ox;
      const y = piece.y + cy + oy;
      if (x < 0 || x >= COLS || y >= ROWS) return true;
      if (y >= 0 && grid[y][x]) return true;
    }
    return false;
  }

  function lockPiece() {
    for (const [cx, cy] of current.cells) {
      const x = current.x + cx;
      const y = current.y + cy;
      if (y < 0) { return die(); }
      grid[y][x] = current.color;
    }
    clearLines();
    current = nextPiece();
    if (collides(current, 0, 0)) die();
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (grid[y].every(c => c)) {
        grid.splice(y, 1);
        grid.unshift(Array(COLS).fill(null));
        cleared++;
        y++;
      }
    }
    if (cleared > 0) {
      const points = [0, 100, 300, 500, 800][cleared] * level;
      score += points;
      lines += cleared;
      const newLevel = Math.floor(lines / 10) + 1;
      if (newLevel !== level) {
        level = newLevel;
        dropMs = Math.max(80, 800 - (level - 1) * 70);
      }
      scoreEl.textContent = score;
      linesEl.textContent = lines;
      levelEl.textContent = level;
      if (score > best) {
        best = score;
        localStorage.setItem('tetris.best', String(best));
        bestEl.textContent = best;
      }
    }
  }

  function move(dx) {
    if (!alive) return;
    if (!collides(current, dx, 0)) current.x += dx;
  }

  function softDrop() {
    if (!alive) return;
    if (!collides(current, 0, 1)) {
      current.y += 1;
      score += 1;
      scoreEl.textContent = score;
    } else {
      lockPiece();
    }
    lastDrop = performance.now();
  }

  function hardDrop() {
    if (!alive) return;
    let dy = 0;
    while (!collides(current, 0, dy + 1)) dy++;
    current.y += dy;
    score += dy * 2;
    scoreEl.textContent = score;
    lockPiece();
    lastDrop = performance.now();
  }

  function tryRotate() {
    if (!alive) return;
    const rotated = rotate(current);
    const kicks = [0, -1, 1, -2, 2];
    for (const k of kicks) {
      if (!collides(current, k, 0, rotated)) {
        current.cells = rotated;
        current.x += k;
        return;
      }
    }
  }

  function die() {
    alive = false;
    titleEl.textContent = Lang.t('Конец игры', 'Spēles beigas', 'Game over');
    const beatBest = score > 0 && score >= best;
    const baseMsg = Lang.t(
      `Счёт ${score}, линии ${lines}. Жми Старт.`,
      `Rezultāts ${score}, līnijas ${lines}. Spied Sākt.`,
      `Score ${score}, ${lines} lines. Tap Start to try again.`
    );
    // Spanish sneak-in: 50% chance of an ES cheer when you beat your best.
    msgEl.textContent = beatBest ? Lang.pickEs(`${Lang.esWin()} (${score})`, baseMsg, 0.5) : baseMsg;
    startBtn.textContent = Lang.t('Снова', 'Vēlreiz', 'Again');
    overlay.classList.add('show');
  }

  function reset() {
    grid = newGrid();
    queue = [];
    refillQueue();
    current = nextPiece();
    score = 0;
    lines = 0;
    level = 1;
    dropMs = 800;
    alive = true;
    scoreEl.textContent = score;
    linesEl.textContent = lines;
    levelEl.textContent = level;
  }

  function draw() {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    const cw = w / COLS;
    const ch = h / ROWS;

    ctx.fillStyle = '#131a33';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#1b2347';
    ctx.lineWidth = 1;
    for (let i = 1; i < COLS; i++) {
      const x = i * cw;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    for (let j = 1; j < ROWS; j++) {
      const y = j * ch;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }

    if (!grid) return;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x]) drawCell(x, y, cw, ch, grid[y][x]);
      }
    }

    if (current && alive) {
      let ghostDy = 0;
      while (!collides(current, 0, ghostDy + 1)) ghostDy++;
      for (const [cx, cy] of current.cells) {
        const gx = current.x + cx;
        const gy = current.y + cy + ghostDy;
        if (gy >= 0) drawCell(gx, gy, cw, ch, current.color, true);
      }
      for (const [cx, cy] of current.cells) {
        const x = current.x + cx;
        const y = current.y + cy;
        if (y >= 0) drawCell(x, y, cw, ch, current.color);
      }
    }
  }

  function drawCell(x, y, cw, ch, color, ghost) {
    const pad = Math.max(1, cw * 0.06);
    if (ghost) {
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = color;
      ctx.fillRect(x * cw + pad, y * ch + pad, cw - pad * 2, ch - pad * 2);
      ctx.globalAlpha = 1;
      return;
    }
    ctx.fillStyle = color;
    ctx.fillRect(x * cw + pad, y * ch + pad, cw - pad * 2, ch - pad * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x * cw + pad, y * ch + pad, cw - pad * 2, Math.max(2, ch * 0.14));
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    ctx.fillRect(x * cw + pad, y * ch + ch - pad - Math.max(2, ch * 0.14), cw - pad * 2, Math.max(2, ch * 0.14));
  }

  function loop(ts) {
    if (!lastDrop) lastDrop = ts;
    if (ts - lastDrop >= dropMs) {
      lastDrop = ts;
      if (!collides(current, 0, 1)) current.y += 1;
      else lockPiece();
    }
    draw();
    if (alive) raf = requestAnimationFrame(loop);
  }

  function start() {
    cancelAnimationFrame(raf);
    overlay.classList.remove('show');
    reset();
    lastDrop = 0;
    raf = requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', start);

  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a') move(-1);
    else if (k === 'ArrowRight' || k === 'd') move(1);
    else if (k === 'ArrowDown' || k === 's') softDrop();
    else if (k === 'ArrowUp' || k === 'w' || k === 'x') tryRotate();
    else if (k === ' ') hardDrop();
    else if (k === 'Enter') { if (!alive || overlay.classList.contains('show')) start(); }
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  }, { passive: false });

  controls.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const act = btn.dataset.act;
    if (act === 'left') move(-1);
    else if (act === 'right') move(1);
    else if (act === 'rotate') tryRotate();
    else if (act === 'soft') softDrop();
    else if (act === 'hard') hardDrop();
  });

  fitCanvas();
  reset();
  draw();
})();
</script>
</body>
</html>
