<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#0b1020" />
<title>Breakout</title>
<style>
  :root {
    --bg: #0b1020;
    --panel: #131a33;
    --grid: #1b2347;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --paddle: #f59e0b;
    --ball: #fef3c7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: max(env(safe-area-inset-top), 12px) 12px max(env(safe-area-inset-bottom), 12px);
    height: 100dvh;
  }
  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .title-wrap { display: flex; align-items: center; gap: 10px; }
  .back {
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 8px;
    background: var(--panel);
  }
  h1 { font-size: 20px; margin: 0; letter-spacing: 0.5px; }
  .score { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 13px; text-align: right; line-height: 1.3; }
  .score b { color: var(--text); }
  .board-wrap {
    position: relative;
    width: min(100vw - 24px, 480px);
    aspect-ratio: 3 / 4;
    background: var(--panel);
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    touch-action: none;
  }
  canvas { width: 100%; height: 100%; display: block; }
  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    background: rgba(11, 16, 32, 0.82);
    backdrop-filter: blur(4px);
    text-align: center;
    padding: 16px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { margin: 0; font-size: 22px; }
  .overlay p { margin: 0; color: var(--muted); font-size: 14px; }
  button {
    appearance: none;
    border: none;
    background: var(--paddle);
    color: #2a1a04;
    font-weight: 700;
    font-size: 16px;
    padding: 12px 22px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(245, 158, 11, 0.35);
  }
  button:active { transform: translateY(1px); }
  .hint { color: var(--muted); font-size: 13px; text-align: center; max-width: 480px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-wrap">
      <a class="back" href="index.html" data-ru="← Меню" data-lv="← Izvēlne" data-tr-mode="base">← Menu</a>
      <h1 data-ru="Арканоид" data-lv="Breakout" data-tr-mode="base">Breakout</h1>
    </div>
    <div class="score">
      <span data-ru="Счёт" data-lv="Rezultāts" data-en="Score">Score</span> <b id="score">0</b>
      ·
      <span data-ru="Жизни" data-lv="Dzīvības" data-en="Lives">Lives</span> <b id="lives">3</b><br>
      <span data-ru="Уровень" data-lv="Līmenis" data-en="Level">Level</span> <b id="level">1</b>
      ·
      <span data-ru="Лучший" data-lv="Labākais" data-en="Best">Best</span> <b id="best">0</b>
    </div>
  </header>

  <div class="board-wrap" id="board">
    <canvas id="game"></canvas>
    <div class="overlay show" id="overlay">
      <h2 id="title" data-ru="Арканоид" data-lv="Breakout" data-tr-mode="base">Breakout</h2>
      <p id="msg"
         data-ru="Тяни ракетку. Стрелки на компьютере."
         data-lv="Velc plātni. Bultas datorā."
         data-en="Drag the paddle. Arrow keys on desktop.">Drag the paddle. Arrow keys on desktop.</p>
      <button id="startBtn" data-ru="Старт" data-lv="Sākt" data-en="Start">Start</button>
    </div>
  </div>

  <div class="hint"
       data-ru="Совет: тяни в любом месте поля."
       data-lv="Padoms: velc jebkur uz lauka."
       data-en="Tip: drag anywhere on the board.">Tip: drag anywhere on the board.</div>
</div>

<script src="lang.js"></script>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const board = document.getElementById('board');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const titleEl = document.getElementById('title');
  const msgEl = document.getElementById('msg');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');
  const bestEl = document.getElementById('best');

  const W = 300;
  const H = 400;
  const PADDLE_W = 60;
  const PADDLE_H = 8;
  const BALL_R = 5;
  const BRICK_ROWS = 6;
  const BRICK_COLS = 8;
  const BRICK_W = W / BRICK_COLS;
  const BRICK_H = 14;
  const BRICK_TOP = 40;
  const ROW_COLORS = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22d3ee', '#a78bfa'];

  let dpr = 1;
  let scale = 1;
  let paddle, ball, bricks, score, lives, level, best, alive, running, raf;
  let leftKey = false, rightKey = false;
  best = parseInt(localStorage.getItem('breakout.best') || '0', 10);
  bestEl.textContent = best;

  function fitCanvas() {
    const rect = board.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    scale = canvas.width / W / dpr;
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
    draw();
  }
  window.addEventListener('resize', fitCanvas);

  function buildBricks() {
    const arr = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        arr.push({
          x: c * BRICK_W,
          y: BRICK_TOP + r * BRICK_H,
          w: BRICK_W,
          h: BRICK_H,
          color: ROW_COLORS[r],
          points: (BRICK_ROWS - r) * 10,
          alive: true,
        });
      }
    }
    return arr;
  }

  function resetBall() {
    paddle.x = (W - PADDLE_W) / 2;
    ball.x = W / 2;
    ball.y = H - 40;
    const angle = (Math.random() * 0.6 - 0.3) - Math.PI / 2;
    const speed = 3 + (level - 1) * 0.4;
    ball.vx = Math.cos(angle) * speed;
    ball.vy = Math.sin(angle) * speed;
    ball.attached = true;
  }

  function reset(fullReset) {
    paddle = { x: (W - PADDLE_W) / 2, y: H - 20, w: PADDLE_W, h: PADDLE_H };
    ball = { x: W / 2, y: H - 40, vx: 0, vy: 0, attached: true };
    if (fullReset) {
      score = 0;
      lives = 3;
      level = 1;
      bricks = buildBricks();
    }
    resetBall();
    alive = true;
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
  }

  function nextLevel() {
    level += 1;
    bricks = buildBricks();
    resetBall();
    levelEl.textContent = level;
  }

  function loseLife() {
    lives -= 1;
    livesEl.textContent = lives;
    if (lives <= 0) return die();
    resetBall();
  }

  function die() {
    alive = false;
    running = false;
    if (score > best) {
      best = score;
      localStorage.setItem('breakout.best', String(best));
      bestEl.textContent = best;
    }
    titleEl.textContent = Lang.t('Конец игры', 'Spēles beigas', 'Game over');
    const beatBest = score > 0 && score >= best;
    const baseMsg = Lang.t(
      `Счёт ${score}. Жми Старт.`,
      `Rezultāts ${score}. Spied Sākt.`,
      `Score ${score}. Tap Start to try again.`
    );
    // Spanish sneak-in on a new high score.
    msgEl.textContent = beatBest ? Lang.pickEs(`${Lang.esWin()} (${score})`, baseMsg, 0.5) : baseMsg;
    startBtn.textContent = Lang.t('Снова', 'Vēlreiz', 'Again');
    overlay.classList.add('show');
  }

  function step() {
    if (leftKey) paddle.x -= 5;
    if (rightKey) paddle.x += 5;
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    if (ball.attached) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - BALL_R - 1;
      return;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;

    if (ball.x < BALL_R) { ball.x = BALL_R; ball.vx = -ball.vx; }
    if (ball.x > W - BALL_R) { ball.x = W - BALL_R; ball.vx = -ball.vx; }
    if (ball.y < BALL_R) { ball.y = BALL_R; ball.vy = -ball.vy; }

    if (ball.vy > 0 &&
        ball.y + BALL_R >= paddle.y &&
        ball.y + BALL_R <= paddle.y + paddle.h + 6 &&
        ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
      ball.y = paddle.y - BALL_R;
      const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      const speed = Math.hypot(ball.vx, ball.vy);
      const angle = hit * (Math.PI / 3) - Math.PI / 2;
      ball.vx = Math.cos(angle) * speed;
      ball.vy = Math.sin(angle) * speed;
    }

    for (const b of bricks) {
      if (!b.alive) continue;
      if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + b.w &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + b.h) {
        b.alive = false;
        score += b.points;
        scoreEl.textContent = score;
        const prevX = ball.x - ball.vx;
        const prevY = ball.y - ball.vy;
        if (prevX <= b.x || prevX >= b.x + b.w) ball.vx = -ball.vx;
        else ball.vy = -ball.vy;
        break;
      }
    }

    if (ball.y > H + BALL_R) loseLife();

    if (bricks.every(b => !b.alive)) nextLevel();
  }

  function draw() {
    ctx.fillStyle = '#131a33';
    ctx.fillRect(0, 0, W, H);

    for (const b of bricks || []) {
      if (!b.alive) continue;
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(b.x + 1, b.y + 1, b.w - 2, 3);
    }

    if (paddle) {
      ctx.fillStyle = 'var(--paddle)';
      ctx.fillStyle = '#f59e0b';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(paddle.x, paddle.y, paddle.w, 2);
    }

    if (ball) {
      ctx.fillStyle = '#fef3c7';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function loop() {
    if (running) {
      step();
      draw();
      raf = requestAnimationFrame(loop);
    }
  }

  function start() {
    cancelAnimationFrame(raf);
    overlay.classList.remove('show');
    reset(true);
    running = true;
    raf = requestAnimationFrame(loop);
  }

  function launchBall() {
    if (alive && ball && ball.attached) ball.attached = false;
  }

  startBtn.addEventListener('click', () => { start(); setTimeout(launchBall, 300); });

  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === 'ArrowLeft' || k === 'a') leftKey = true;
    else if (k === 'ArrowRight' || k === 'd') rightKey = true;
    else if (k === ' ' || k === 'Enter') {
      if (!alive || overlay.classList.contains('show')) start();
      else launchBall();
    }
    if (['ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
  }, { passive: false });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') leftKey = false;
    else if (e.key === 'ArrowRight' || e.key === 'd') rightKey = false;
  });

  function localX(clientX) {
    const rect = board.getBoundingClientRect();
    return ((clientX - rect.left) / rect.width) * W;
  }
  let dragging = false;
  board.addEventListener('pointerdown', (e) => {
    dragging = true;
    if (paddle) paddle.x = Math.max(0, Math.min(W - paddle.w, localX(e.clientX) - paddle.w / 2));
    launchBall();
    e.preventDefault();
  });
  board.addEventListener('pointermove', (e) => {
    if (!dragging || !paddle) return;
    paddle.x = Math.max(0, Math.min(W - paddle.w, localX(e.clientX) - paddle.w / 2));
    e.preventDefault();
  });
  window.addEventListener('pointerup', () => { dragging = false; });
  window.addEventListener('pointercancel', () => { dragging = false; });

  reset(true);
  fitCanvas();
  draw();
})();
</script>
</body>
</html>
